services:
  # Go API Service
  go-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    user: "${UID}:${GID}"
    container_name: go-api
    image: lf4a/mqtt-ss-api:local
    env_file: .env
    environment:
      - MQTT_HOST_IP=${HOST_IP:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo-db
      - broker
    ports:
      - 8080:8080
    networks:
      - backend
    # TODO: Implement mTLS security - See docs/SECURITY_IMPLEMENTATION.md
    # secrets:
    #   - ca.crt
    #   - web.crt
    #   - web.key

  broker:
    user: "${UID}:${GID}"
    image: eclipse-mosquitto:latest
    container_name: broker
    hostname: broker
    ports:
      # - "8883:8883"  # TODO: Uncomment for mTLS
      - "1883:1883"
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - backend
    # TODO: Implement mTLS security - See docs/SECURITY_IMPLEMENTATION.md
    # secrets:
    #   - ca.crt
    #   - server.crt
    #   - server.key

  mongo-db:
    container_name: mongo-db
    image: mongo:latest
    env_file: .env
    command: ["--auth"]
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend
  
  minio:
    container_name: minio
    image: quay.io/minio/minio:latest
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend

volumes:
  mongo-data:
  minio-data:

networks:
  backend:

